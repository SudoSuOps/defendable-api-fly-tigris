# Fly.io app · DefendableOS API · Postgres swarm-and-bee · Tigris object storage
# Deploy: `fly launch --no-deploy` (first time) then `fly deploy`
# Secrets (set once): fly secrets set DATABASE_URL=... AWS_ACCESS_KEY_ID=... AWS_SECRET_ACCESS_KEY=... API_BEARER_TOKEN=...

app = "defendable-api"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_NAME = "DefendableAPI"
  PORT = "8080"
  UVICORN_WORKERS = "2"
  AWS_ENDPOINT_URL_S3 = "https://fly.storage.tigris.dev"
  AWS_REGION = "auto"
  TIGRIS_BUCKET = "defendable-ledger"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
